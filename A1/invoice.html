<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="robots" content="noindex, nofollow">
    <meta name="author" content="AK Creation">
    <link rel="canonical" href="https://akcreation-apps.com/A1/invoice.html">
    <link rel="apple-touch-icon" sizes="180x180" href="a1-logo.png">
    <link rel="icon" type="image/png" sizes="32x32" href="a1-logo.png">
    <link rel="icon" type="image/png" sizes="16x16" href="a1-logo.png">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="icon" href="a1-logo.png">
    <meta name="theme-color" content="#1A1A2E">
    <title>Order History — A1 Amul Fast Food</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Analytics -->
    <script defer src="https://cloud.umami.is/script.js" data-website-id="36497ef4-1185-47b9-bcfb-24598a1a29d3"></script>

    <script src="restaurant.js"></script>
    <script src="invoice_scripts.js" type="module"></script>
    <script src="common.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary:   #FF6B35;
            --navy:      #1A1A2E;
            --bg:        #F5F0EB;
            --card:      #FFFFFF;
            --text:      #2D2D2D;
            --muted:     #888;
            --border:    #E2D9D0;
            --shadow-sm: 0 1px 4px rgba(0,0,0,0.07);
            --shadow-md: 0 4px 14px rgba(0,0,0,0.13);
            --r:         12px;
            --nav-h:     56px;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            color: var(--text);
            padding-top: var(--nav-h);
        }

        /* ── Loader ── */
        .loader-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 9999; justify-content: center; align-items: center;
        }
        .loader {
            width: 44px; height: 44px;
            border: 4px solid rgba(255,255,255,0.25);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.75s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Navbar ── */
        .navbar {
            position: fixed; top: 0; left: 0; right: 0;
            height: var(--nav-h); z-index: 1000;
            background: var(--navy);
            display: flex; align-items: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.3);
        }
        .navbar-inner {
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
        }
        .logo {
            cursor: pointer; flex: 1; min-width: 0;
            display: flex; align-items: center; gap: 10px;
        }
        .logo img { height: 40px; width: auto; display: block; flex-shrink: 0; }
        .logo-text {
            font-size: 0.95rem; font-weight: 700; color: #fff;
            font-family: 'Poppins', sans-serif;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .logo-text .brand-accent { color: var(--primary); }
        .cart-icon { position: relative; }
        .cart-count {
            position: absolute; top: -7px; right: -9px;
            background: var(--primary); color: #fff;
            font-size: 0.6rem; font-weight: 700;
            min-width: 16px; height: 16px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            padding: 0 3px;
        }
        /* ── needed by JS ── */
        .icon-container { display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
        .nav-icon {
            color: rgba(255,255,255,0.88);
            font-size: 1.1rem; cursor: pointer;
            display: flex; align-items: center;
            text-decoration: none;
            transition: color 0.2s, transform 0.2s;
            background: none; border: none; padding: 0;
        }
        .nav-icon:hover { color: #fff; transform: scale(1.1); }
        .refer-btn { position: relative; }
        .refer-btn::after {
            content: '';
            position: absolute; top: -4px; right: -4px;
            width: 8px; height: 8px;
            background: #FFD700; border-radius: 50%;
            animation: referPulse 1.4s ease-in-out infinite;
        }
        @keyframes referPulse {
            0%,100% { transform: scale(1);   opacity: 1; box-shadow: 0 0 0 0 rgba(255,215,0,0.7); }
            50%      { transform: scale(1.25); opacity: 0.8; box-shadow: 0 0 0 5px rgba(255,215,0,0); }
        }

        /* ── Page header ── */
        .page-header {
            max-width: 1200px; margin: 0 auto;
            padding: 18px 20px 6px;
        }
        .page-header h1 {
            font-size: 1.1rem; font-weight: 700; color: var(--navy);
            display: flex; align-items: center; gap: 8px;
        }
        .page-header p {
            font-size: 0.75rem; color: var(--muted); margin-top: 2px;
        }

        /* ── Empty state ── */
        #empty-invoice-banner {
            text-align: center; padding: 60px 20px;
        }
        #empty-invoice-banner img {
            max-width: 200px; height: auto;
            opacity: 0.8; display: block; margin: 0 auto 14px;
        }
        #empty-invoice-banner p {
            font-size: 0.85rem; color: var(--muted);
        }

        /* ── Orders list wrapper ── */
        #orderList {
            max-width: 1200px; margin: 0 auto;
            padding: 6px 20px 30px;
        }

        /* Desktop: 2-column card grid */
        @media (min-width: 768px) {
            #orderList {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
                align-items: start;
            }
            .order-container { margin-bottom: 0; }
        }
        @media (min-width: 1100px) {
            #orderList { grid-template-columns: repeat(3, 1fr); }
        }

        /* ── Order card (created by invoice_scripts.js) ── */
        .order-container {
            background: var(--card);
            border-radius: var(--r);
            padding: 14px 16px;
            margin-bottom: 10px;
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            transition: box-shadow 0.2s;
            border-left: 3px solid var(--primary);
            position: relative;
        }
        .order-container:hover { box-shadow: var(--shadow-md); }
        .order-container::after {
            content: '\f107'; /* fa-angle-down */
            font-family: 'Font Awesome 6 Free'; font-weight: 900;
            position: absolute; right: 14px; top: 14px;
            color: var(--muted); font-size: 0.9rem;
            transition: transform 0.2s;
        }

        .order-header {
            display: flex; justify-content: space-between;
            align-items: flex-start; gap: 8px;
            padding-right: 20px; /* room for chevron */
        }
        .order-header h2 {
            font-size: 0.88rem; font-weight: 700;
            color: var(--navy); margin: 0;
        }
        .order-header p {
            font-size: 0.7rem; color: var(--muted);
            margin: 0; white-space: nowrap;
        }
        .order-total {
            font-size: 0.82rem; font-weight: 700;
            color: var(--primary); margin: 4px 0 0;
        }

        /* Expanded state */
        .order-details {
            display: none;
            margin-top: 12px; padding-top: 12px;
            border-top: 1px solid var(--border);
        }
        .order-details h3 {
            font-size: 0.7rem; font-weight: 700;
            color: var(--navy); text-transform: uppercase;
            letter-spacing: 0.8px; margin: 10px 0 4px;
        }
        .order-details h3:first-child { margin-top: 0; }

        .dish-item {
            display: flex; justify-content: space-between;
            align-items: center; padding: 5px 0;
            border-bottom: 1px solid #f5f0eb;
            font-size: 0.78rem; color: var(--text);
        }
        .dish-item .dish-name { font-weight: 500; }
        .dish-item span:last-child { color: var(--muted); white-space: nowrap; }

        /* Action icons */
        .icons {
            display: flex; justify-content: flex-end;
            gap: 8px; margin-top: 14px;
            padding-top: 10px; border-top: 1px solid var(--border);
        }
        .icons i {
            width: 36px; height: 36px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%; cursor: pointer; font-size: 0.85rem;
            transition: background 0.15s;
        }
        .delete-icon { color: #dc3545; }
        .delete-icon:hover { background: #fdecea; }
        .preview-icon { color: var(--primary); }
        .preview-icon:hover { background: rgba(255,107,53,0.1); }
    </style>
</head>
<body>

    <!-- Loader -->
    <div class="loader-overlay" id="loaderOverlay">
        <div class="loader"></div>
    </div>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-inner">
            <div class="logo" onclick="redirect_to_home()">
                <img src="a1-logo.png" alt="A1 Amul Fast Food logo" />
                <span class="logo-text"><span class="brand-accent">A1 Amul</span> Fast Food</span>
            </div>
            <div class="icon-container">
                <a class="nav-icon refer-btn" href="referral.html" title="Refer &amp; Earn" aria-label="Refer &amp; Earn">
                    <i class="fas fa-share-alt" aria-hidden="true"></i>
                </a>
                <button class="nav-icon cart-icon" onclick="redirect_to_cart()" aria-label="View cart">
                    <i class="fas fa-shopping-cart" aria-hidden="true"></i>
                    <span class="cart-count" aria-label="0 items in cart">0</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Page title -->
    <div class="page-header">
        <h1><i class="fas fa-receipt" style="color:var(--primary);font-size:0.9rem;"></i> Order History</h1>
        <p>Tap an order card to view details</p>
    </div>

    <!-- Empty state -->
    <div id="empty-invoice-banner" style="display: none;">
        <img src="../food_src/no_invoice_generated.webp" alt="No orders yet">
        <p>No approved orders yet</p>
    </div>

    <!-- Orders list — filled by invoice_scripts.js -->
    <div id="orderList"></div>

</body>
</html>
