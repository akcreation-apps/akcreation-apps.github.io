<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="60%" stop-color="#0d2044"/>
      <stop offset="100%" stop-color="#112d60"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e85d04"/>
      <stop offset="100%" stop-color="#fb8500"/>
    </linearGradient>
    <linearGradient id="waGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#128c7e"/>
      <stop offset="100%" stop-color="#25d366"/>
    </linearGradient>
    <linearGradient id="divider" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="30%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="70%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle radial glow behind right panel -->
  <circle cx="920" cy="315" r="380" fill="#1a3a70" opacity="0.55"/>
  <circle cx="920" cy="315" r="240" fill="#1d4080" opacity="0.35"/>

  <!-- Subtle grid texture lines (horizontal) -->
  <line x1="0" y1="157" x2="1200" y2="157" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="473" x2="1200" y2="473" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Left orange accent bar -->
  <rect x="52" y="72" width="5" height="400" rx="3" fill="url(#orangeGrad)"/>

  <!-- ===== LEFT PANEL ===== -->

  <!-- Location badge -->
  <rect x="70" y="58" width="282" height="38" rx="19" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
  <circle cx="90" cy="77" r="6" fill="#e85d04"/>
  <text x="104" y="82" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#aac8ef" font-weight="500" letter-spacing="0.3">Banki, Cuttack, Odisha 754008</text>

  <!-- Main headline: BANKI -->
  <text x="70" y="192" font-family="Arial Black, Arial, sans-serif" font-size="100" fill="#ffffff" font-weight="900" letter-spacing="-3">BANKI</text>

  <!-- Main headline: TRANSPORT (orange) -->
  <text x="70" y="286" font-family="Arial Black, Arial, sans-serif" font-size="86" fill="url(#orangeGrad)" font-weight="900" letter-spacing="-2">TRANSPORT</text>

  <!-- Sub: SERVICE -->
  <text x="74" y="344" font-family="Arial, Helvetica, sans-serif" font-size="42" fill="rgba(255,255,255,0.70)" font-weight="700" letter-spacing="8">SERVICE</text>

  <!-- Divider line under headlines -->
  <rect x="70" y="362" width="300" height="2" rx="1" fill="url(#orangeGrad)" opacity="0.6"/>

  <!-- Service pills row -->
  <!-- CAB pill -->
  <rect x="70" y="378" width="96" height="32" rx="16" fill="rgba(232,93,4,0.18)" stroke="#e85d04" stroke-width="1.5"/>
  <text x="118" y="399" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#fb8500" text-anchor="middle" font-weight="700" letter-spacing="0.5">CAB</text>

  <!-- AUTO pill -->
  <rect x="178" y="378" width="130" height="32" rx="16" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.22)" stroke-width="1.5"/>
  <text x="243" y="399" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#d0e8ff" text-anchor="middle" font-weight="600" letter-spacing="0.5">AUTO RICKSHAW</text>

  <!-- TRACTOR pill -->
  <rect x="320" y="378" width="120" height="32" rx="16" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.22)" stroke-width="1.5"/>
  <text x="380" y="399" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#d0e8ff" text-anchor="middle" font-weight="600" letter-spacing="0.5">TRACTOR</text>

  <!-- WhatsApp CTA button -->
  <rect x="70" y="426" width="280" height="58" rx="29" fill="url(#waGrad)"/>
  <!-- Subtle shine on button -->
  <rect x="70" y="426" width="280" height="29" rx="29" fill="rgba(255,255,255,0.07)"/>
  <text x="210" y="462" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#ffffff" text-anchor="middle" font-weight="700" letter-spacing="0.3">Book via WhatsApp</text>

  <!-- Phone number -->
  <text x="70" y="516" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#7aafdb">+91 77499 84274</text>
  <rect x="70" y="521" width="148" height="1" fill="rgba(122,175,219,0.3)"/>

  <!-- ===== CENTER DIVIDER ===== -->
  <rect x="624" y="0" width="1" height="630" fill="url(#divider)"/>

  <!-- ===== RIGHT PANEL — 3 SERVICE CARDS ===== -->

  <!-- CARD 1: Cab Booking -->
  <rect x="648" y="44" width="508" height="166" rx="14" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>
  <!-- Left color border -->
  <rect x="648" y="44" width="5" height="166" rx="3" fill="#e85d04"/>
  <!-- Icon circle -->
  <circle cx="726" cy="127" r="40" fill="rgba(232,93,4,0.15)" stroke="rgba(232,93,4,0.3)" stroke-width="1.5"/>
  <text x="726" y="139" font-family="Arial Black, sans-serif" font-size="28" fill="#fb8500" text-anchor="middle" font-weight="900">CAB</text>
  <!-- Card text -->
  <text x="790" y="98" font-family="Arial Black, Arial, sans-serif" font-size="22" fill="#ffffff" font-weight="800">Cab Booking</text>
  <text x="790" y="123" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#7fc8f8">Local &amp; Outstation Trips</text>
  <text x="790" y="145" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="rgba(255,255,255,0.42)">AC / Non-AC  ·  Airport Drop  ·  Hospital</text>
  <!-- Price indicator -->
  <rect x="790" y="158" width="72" height="22" rx="11" fill="rgba(232,93,4,0.2)"/>
  <text x="826" y="173" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#fb8500" text-anchor="middle" font-weight="600">FROM ₹100</text>

  <!-- CARD 2: Auto Rickshaw -->
  <rect x="648" y="232" width="508" height="166" rx="14" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>
  <rect x="648" y="232" width="5" height="166" rx="3" fill="#25d366"/>
  <circle cx="726" cy="315" r="40" fill="rgba(37,211,102,0.12)" stroke="rgba(37,211,102,0.28)" stroke-width="1.5"/>
  <text x="726" y="327" font-family="Arial Black, sans-serif" font-size="22" fill="#25d366" text-anchor="middle" font-weight="900">AUTO</text>
  <text x="790" y="286" font-family="Arial Black, Arial, sans-serif" font-size="22" fill="#ffffff" font-weight="800">Auto Rickshaw</text>
  <text x="790" y="311" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#7fc8f8">Short Rides Within Banki</text>
  <text x="790" y="333" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="rgba(255,255,255,0.42)">Market  ·  School  ·  College Routes</text>
  <rect x="790" y="346" width="80" height="22" rx="11" fill="rgba(37,211,102,0.18)"/>
  <text x="830" y="361" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#25d366" text-anchor="middle" font-weight="600">FROM ₹50</text>

  <!-- CARD 3: Tractor Rental -->
  <rect x="648" y="420" width="508" height="166" rx="14" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>
  <rect x="648" y="420" width="5" height="166" rx="3" fill="#fbbf24"/>
  <circle cx="726" cy="503" r="40" fill="rgba(251,191,36,0.12)" stroke="rgba(251,191,36,0.28)" stroke-width="1.5"/>
  <text x="726" y="515" font-family="Arial Black, sans-serif" font-size="18" fill="#fbbf24" text-anchor="middle" font-weight="900">TRACTOR</text>
  <text x="790" y="474" font-family="Arial Black, Arial, sans-serif" font-size="22" fill="#ffffff" font-weight="800">Tractor Rental</text>
  <text x="790" y="499" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#7fc8f8">Transport &amp; Agriculture</text>
  <text x="790" y="521" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="rgba(255,255,255,0.42)">Sand  ·  Bricks  ·  Farm Plowing</text>
  <rect x="790" y="534" width="82" height="22" rx="11" fill="rgba(251,191,36,0.18)"/>
  <text x="831" y="549" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#fbbf24" text-anchor="middle" font-weight="600">CALL TO BOOK</text>

  <!-- ===== BOTTOM BAR ===== -->
  <rect x="0" y="580" width="1200" height="50" fill="rgba(0,0,0,0.40)"/>
  <!-- Separator dots -->
  <circle cx="270" cy="605" r="3" fill="rgba(255,255,255,0.2)"/>
  <circle cx="570" cy="605" r="3" fill="rgba(255,255,255,0.2)"/>
  <circle cx="870" cy="605" r="3" fill="rgba(255,255,255,0.2)"/>

  <!-- Stat 1 -->
  <circle cx="75" cy="605" r="5" fill="#25d366"/>
  <text x="90" y="610" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#e2e8f0" font-weight="600">24/7 Available</text>

  <!-- Stat 2 -->
  <circle cx="360" cy="605" r="5" fill="#e85d04"/>
  <text x="375" y="610" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#e2e8f0" font-weight="600">Instant WhatsApp Booking</text>

  <!-- Stat 3 -->
  <circle cx="655" cy="605" r="5" fill="#7fc8f8"/>
  <text x="670" y="610" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#e2e8f0" font-weight="600">Affordable Rates</text>

  <!-- Brand -->
  <text x="1140" y="610" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="rgba(255,255,255,0.45)" text-anchor="end">akcreation-apps.com</text>
</svg>
