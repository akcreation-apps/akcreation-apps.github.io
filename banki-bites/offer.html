  <style>
    :root {
      --brand: #FF6B35;
      --brand-dark: #d8552a;
      --bg: #fff8f3;
      --surface: #ffffff;
      --text: #1a1a2e;
      --muted: #6b7280;
      --border: #f1d9c6;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f0e15;
        --surface: #18141d;
        --text: #f3f4f6;
        --muted: #9aa3b2;
        --border: #2a2330;
      }
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .offer-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .offer-header img { width: 36px; height: 36px; border-radius: 8px; }
    .offer-header strong {
      font-family: 'Poppins', sans-serif;
      font-size: 1.05rem;
      color: var(--brand);
    }
    main.offer-main {
      flex: 1 0 auto;
      width: 100%;
      max-width: 720px;
      margin: 0 auto;
      padding: 20px 16px 32px;
      text-align: center;
    }
    .offer-title {
      font-family: 'Poppins', sans-serif;
      font-weight: 800;
      font-size: 1.5rem;
      margin: 8px 0 14px;
    }
    .offer-image-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    }
    .offer-image-wrap img {
      display: block;
      width: 100%;
      height: auto;
    }
    .offer-cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 22px;
      min-height: 48px;
      padding: 12px 28px;
      background: var(--brand);
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
      border-radius: 999px;
      text-decoration: none;
      box-shadow: 0 4px 12px rgba(255,107,53,0.35);
      transition: background 0.15s ease;
    }
    .offer-cta:hover, .offer-cta:focus {
      background: var(--brand-dark);
      color: #fff;
      text-decoration: none;
    }
    .offer-sub {
      color: var(--muted);
      font-size: 0.95rem;
      margin-top: 14px;
    }
    footer {
      flex-shrink: 0;
      padding: 16px;
      text-align: center;
      font-size: 0.85rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
      background: var(--surface);
    }
    footer a { color: var(--brand); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    @media (min-width: 768px) {
      .offer-title { font-size: 2rem; }
      main.offer-main { padding: 32px 24px 48px; }
    }
  </style>
</head>
<body>
  <header class="offer-header">
    <img src="banki-bites-logo.png" alt="BankiBites">
    <strong>BankiBites</strong>
  </header>

  <main class="offer-main">
    <h1 class="offer-title">Today's Offer</h1>
    <div class="offer-image-wrap">
      <img src="offer.jpg" alt="BankiBites offer">
    </div>
    <p class="offer-sub">Tap below to start ordering on BankiBites.</p>
    <a class="offer-cta" href="index.html">
      <i class="fas fa-utensils"></i> Order on BankiBites
    </a>
  </main>

  <footer>
    <p>&copy; <span id="footer-year"></span> <a href="https://akcreation-apps.com/services.html">AK Creation</a>. All rights reserved. &nbsp;|&nbsp; Made in Odisha ❤️</p>
  </footer>
  <script>
    document.getElementById('footer-year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
