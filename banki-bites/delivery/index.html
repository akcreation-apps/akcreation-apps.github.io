<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
  <meta name="color-scheme" content="light dark">
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#FF6B35">
  <meta name="theme-color" media="(prefers-color-scheme: dark)"  content="#0b0d12">
  <meta name="robots" content="noindex, nofollow">

  <title>BankiBites — Delivery</title>

  <link rel="apple-touch-icon" sizes="180x180" href="/banki-bites/banki-bites-logo.png">
  <link rel="icon" type="image/png" href="/banki-bites/banki-bites-logo.png">
  <link rel="shortcut icon" href="/banki-bites/banki-bites-logo.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://akcreation-apps.com/assets/bootstrap/css/bootstrap.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../admin/styles.css">
  <link rel="stylesheet" href="styles.css">

  <script defer src="https://cloud.umami.is/script.js" data-website-id="36497ef4-1185-47b9-bcfb-24598a1a29d3"></script>
</head>
<body>

  <div id="authGate" class="auth-gate">
    <div class="auth-card">
      <img src="/banki-bites/banki-bites-logo.png" alt="BankiBites" class="auth-logo">
      <h2>Delivery Login</h2>
      <p class="text-muted">Sign in with the email and password your manager set up for you.</p>
      <form id="signInForm">
        <div class="form-group text-left">
          <input class="form-control" type="email" id="emailInput" placeholder="Email" required autocomplete="username">
        </div>
        <div class="form-group text-left">
          <input class="form-control" type="password" id="passwordInput" placeholder="Password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary btn-block">Sign in</button>
      </form>
      <p id="authError" class="auth-error" hidden></p>
    </div>
  </div>

  <div id="appShell" hidden>
    <h1 class="sr-only">BankiBites Delivery</h1>
    <header class="topbar">
      <div class="topbar-brand">
        <img src="/banki-bites/banki-bites-logo.png" alt="" class="topbar-logo">
        <span>Delivery</span>
      </div>
      <div class="topbar-user">
        <span id="userEmail" class="user-email"></span>
        <button id="signOutBtn" class="btn btn-sm btn-outline-light" title="Sign out">
          <i class="fas fa-sign-out-alt"></i>
        </button>
      </div>
    </header>

    <main class="content">
      <div class="segmented" role="tablist" aria-label="View">
        <button id="seg-btn-active"    class="seg-btn active" data-view="active"    role="tab" aria-selected="true"  aria-controls="ordersList"><i class="fas fa-bolt"             aria-hidden="true"></i> Active</button>
        <button id="seg-btn-delivered" class="seg-btn"        data-view="delivered" role="tab" aria-selected="false" aria-controls="ordersList"><i class="fas fa-clock-rotate-left" aria-hidden="true"></i> History</button>
        <button id="seg-btn-earnings"  class="seg-btn"        data-view="earnings"  role="tab" aria-selected="false" aria-controls="earningsView"><i class="fas fa-coins"           aria-hidden="true"></i> Earnings</button>
      </div>
      <select id="filter" class="d-none" aria-hidden="true" tabindex="-1">
        <option value="active">Active</option>
        <option value="delivered">Delivered today</option>
      </select>
      <div id="ordersList" class="card-list" role="tabpanel" aria-labelledby="seg-btn-active" tabindex="-1"><div class="bb-loader-block">Loading deliveries…</div></div>
      <div id="earningsView" hidden role="tabpanel" aria-labelledby="seg-btn-earnings" tabindex="-1"></div>
    </main>

    <footer class="admin-footer">
      <p>&copy; <span id="footer-year"></span> <a href="https://akcreation-apps.com/services.html">AK Creation</a>. All rights reserved. &nbsp;|&nbsp; Made in Odisha ❤️</p>
    </footer>
  </div>

  <script>document.getElementById('footer-year').textContent = new Date().getFullYear();</script>
  <script type="module" src="app.js?v=20260606-emoji-fix-2"></script>
</body>
</html>
