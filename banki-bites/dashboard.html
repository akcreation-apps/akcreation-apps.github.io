  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {

    html { scroll-behavior: smooth; }

    body {

      background: var(--bg);
      color: var(--text);
      padding-top: var(--nav-h);
      min-height: 100vh;

    }
    /* Push footer to viewport bottom when content is short */
    .grid { flex: 1 0 auto; }
    footer { flex-shrink: 0; }

    /* ── Navbar (shared with index) ── */
    .navbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      height: var(--nav-h);
      background: var(--navy);
      display: flex; align-items: center;
      padding: 0 20px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.3);
    }
    .navbar-inner {
      max-width: 1200px; margin: 0 auto; width: 100%;
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px;
    }
    .brand {
      display: flex; align-items: center; gap: 10px; text-decoration: none;
    }
    .brand-icon {
      width: 36px; height: 36px; border-radius: 10px;
      overflow: hidden; flex-shrink: 0;
    }
    .brand-icon img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .brand-name { font-size: 1.2rem; font-weight: 800; color: #fff; letter-spacing: -0.5px; }
    .brand-name span { color: var(--primary); }
    .nav-back {
      color: rgba(255,255,255,0.7); font-size: 0.8rem; font-weight: 500;
      text-decoration: none; display: flex; align-items: center; gap: 5px;
      transition: color 0.2s;
    }
    .nav-back:hover { color: #fff; }

    /* ── Sticky cuisine filter bar (replaces verbose page header) ── */
    .filter-bar {
      position: sticky; top: var(--nav-h); z-index: 50;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
    }
    .filter-row {
      max-width: 1200px; margin: 0 auto;
      display: flex; gap: 8px; padding-right: 32px;
      overflow-x: auto; overflow-y: hidden;
      scrollbar-width: none; -ms-overflow-style: none;
      mask-image: linear-gradient(to right, #000 calc(100% - 40px), transparent);
      -webkit-mask-image: linear-gradient(to right, #000 calc(100% - 40px), transparent);
    }
    .filter-row::-webkit-scrollbar { display: none; }
    .filter-chip {
      flex-shrink: 0; white-space: nowrap;
      font-family: 'Poppins', sans-serif;
      font-size: 0.78rem; font-weight: 600;
      padding: 7px 14px; border-radius: 20px;
      background: var(--card); color: var(--text);
      border: 1.5px solid var(--border);
      cursor: pointer; transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .filter-chip:hover { border-color: var(--primary); color: var(--primary); }
    .filter-chip.active {
      background: var(--primary); border-color: var(--primary); color: #fff;
    }
    .filter-chip .count {
      margin-left: 4px; opacity: 0.7; font-weight: 500;
    }

    /* ── Grid (uniform card height across rows) ── */
    .grid {
      max-width: 1200px; margin: 0 auto;
      padding: 20px 20px 60px;
      display: grid;
      grid-template-columns: 1fr;
      grid-auto-rows: max-content;
      align-content: start;
      gap: 16px;
    }

    /* ── Restaurant Card (one-tap link) ── */
    .rest-card {
      background: var(--card); border-radius: 16px;
      border: 1px solid var(--border);
      box-shadow: 0 1px 6px rgba(0,0,0,0.06);
      overflow: hidden;
      transition: box-shadow 0.2s, transform 0.2s, border-color 0.2s;
      text-decoration: none; color: inherit;
      display: flex; flex-direction: column;
      align-self: start;
    }
    .rest-card:hover, .rest-card:focus-visible {
      box-shadow: 0 8px 32px rgba(255,107,53,0.14);
      transform: translateY(-2px);
      border-color: var(--primary);
      outline: none;
    }
    .card-inner { display: flex; align-items: center; gap: 12px; padding: 12px 14px; flex: 1; }
    .card-logo {
      width: 52px; height: 52px; border-radius: 50%;
      object-fit: cover; flex-shrink: 0;
      border: 2px solid var(--border);
    }
    .card-logo-skeleton {
      width: 52px; height: 52px; border-radius: 50%;
      background: linear-gradient(90deg, #f0e6de 25%, #ffe8db 50%, #f0e6de 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite; flex-shrink: 0;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .card-body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; }
    .card-name {
      font-size: 0.92rem; font-weight: 700; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      line-height: 1.25;
    }
    /* horizontal-scroll cuisine chip row — keeps card height constant
       no matter how many services a restaurant has */
    .card-tags {
      display: flex; gap: 5px; flex-wrap: nowrap;
      overflow-x: auto; overflow-y: hidden;
      scrollbar-width: none;
      -ms-overflow-style: none;
      mask-image: linear-gradient(to right, #000 calc(100% - 14px), transparent);
      -webkit-mask-image: linear-gradient(to right, #000 calc(100% - 14px), transparent);
      padding-right: 4px;
    }
    .card-tags::-webkit-scrollbar { display: none; }
    .tag {
      font-size: 0.66rem; font-weight: 600; padding: 1px 7px;
      border-radius: 9px; background: #FFF0E8; color: var(--primary);
      border: 1px solid rgba(255,107,53,0.15);
      flex-shrink: 0; white-space: nowrap; line-height: 1.5;
    }
    @media (prefers-color-scheme: dark) {
      .tag { background: rgba(255,107,53,0.12); border-color: rgba(255,107,53,0.25); }
    }
    .card-meta { display: flex; align-items: center; gap: 8px; flex-wrap: nowrap; overflow: hidden; }
    .rating { display: inline-flex; align-items: center; gap: 3px; font-size: 0.74rem; font-weight: 700; color: var(--text); flex-shrink: 0; }
    .rating i { color: #f59e0b; font-size: 0.72rem; }
    .rating span { color: var(--muted); font-weight: 400; font-size: 0.68rem; }
    .open-badge {
      font-size: 0.62rem; font-weight: 700; padding: 1px 7px;
      border-radius: 9px; text-transform: uppercase; letter-spacing: 0.3px;
      flex-shrink: 0;
    }
    .open-badge.open  { background: #dcfce7; color: #15803d; }
    .open-badge.open::before  { content: '●'; font-size: 0.5em; margin-right: 3px; vertical-align: middle; }
    .open-badge.closed { background: #fee2e2; color: #b91c1c; }
    .open-badge.closed::before { content: '○'; font-size: 0.5em; margin-right: 3px; vertical-align: middle; }
    @media (prefers-color-scheme: dark) {
      .open-badge.open  { background: rgba(34,197,94,0.16); color: #4ADE80; }
      .open-badge.closed { background: rgba(239,68,68,0.16); color: #F87171; }
    }
    .card-address {
      font-size: 0.7rem; color: var(--muted); line-height: 1.3;
      display: flex; gap: 5px; align-items: center;
    }
    .card-address i { color: var(--primary); font-size: 0.66rem; flex-shrink: 0; }
    .card-address span {
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      min-width: 0; flex: 1;
    }
    .card-cta {
      border-top: 1px solid var(--border);
      padding: 7px 14px;
      display: flex; align-items: center; justify-content: space-between;
      font-size: 0.72rem; font-weight: 700; color: var(--primary);
    }
    .card-cta i { transition: transform 0.2s; }
    .rest-card:hover .card-cta i, .rest-card:focus-visible .card-cta i { transform: translateX(4px); }

    /* ── Skeleton card ── */
    .skeleton-card {
      background: var(--card); border-radius: 16px;
      border: 1px solid var(--border); padding: 18px;
      display: flex; align-items: center; gap: 16px;
    }
    .skel-text {
      background: linear-gradient(90deg, #f0e6de 25%, #ffe8db 50%, #f0e6de 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px;
      display: block;
    }
    .skeleton-body { flex: 1; }
    .skel-text--lg { height: 16px; margin-bottom: 10px; }
    .skel-text--md { height: 12px; margin-bottom: 8px; }
    .skel-text--md:last-child { margin-bottom: 0; }
    @media (prefers-color-scheme: dark) {
      .skel-text, .card-logo-skeleton {
        background: linear-gradient(90deg, #2B2540 25%, #3A3450 50%, #2B2540 75%);
        background-size: 200% 100%;
      }
    }

    /* ── Error state ── */
    .error-state {
      text-align: center; padding: 60px 20px; display: none;
    }
    .error-state i { font-size: 2.5rem; color: var(--border); margin-bottom: 14px; display: block; }
    .error-state p { font-size: 0.85rem; color: var(--muted); }

    /* ── Footer ── */
    footer {
      background: var(--navy); color: rgba(255,255,255,0.5);

    footer a { color: rgba(255,255,255,0.7); text-decoration: none; }

    .footer-app {

    .footer-app .fa-badge { display: inline-flex; padding: 2px; border-radius: 4px; }

    /* ── Closed card — suppress hover lift & disable navigation ── */
    .rest-card-closed { opacity: 0.55; pointer-events: none; }

    }

        <div class="skel-text skel-text--md" style="width:80%"></div>
        <div class="skel-text skel-text--md" style="width:40%"></div>
      </div>
    </div>
    <div class="skeleton-card" aria-hidden="true">
      <div class="card-logo-skeleton"></div>
      <div class="skeleton-body">
        <div class="skel-text skel-text--lg" style="width:55%"></div>
        <div class="skel-text skel-text--md" style="width:75%"></div>
        <div class="skel-text skel-text--md" style="width:45%"></div>
      </div>
    </div>
  </div>

  <!-- Error state -->
  <div class="error-state" id="errorState" role="alert" aria-live="polite">
    <i class="fas fa-wifi-slash" aria-hidden="true"></i>
    <p>Could not load restaurants. Please check your connection and try again.</p>
  </div>

  <!-- Footer -->
  <footer>
    <div class="footer-app">
      <span>Also available on Android &nbsp;—&nbsp;</span>
      <a class="fa-badge"
         href="https://play.google.com/store/apps/details?id=com.akcreation_apps.tcdbanki"
         target="_blank" rel="noopener"
         data-umami-event="bankibites-footer-playstore"
         aria-label="Get BankiBites on Google Play">
        <img alt="Get it on Google Play"
             src="https://play.google.com/intl/en_us/badges/static/images/badges/en_badge_web_generic.png"
             height="44" loading="lazy">
      </a>
    </div>
    <p>
      &copy; <span id="footer-year"></span> &middot;
      Built &amp; powered by <a href="https://akcreation-apps.com/services.html">AkCreation</a> &middot;
      Made in Odisha <span aria-hidden="true">❤️</span>
    </p>
  </footer>

  <script>
    document.getElementById('footer-year').textContent = new Date().getFullYear();

    const grid       = document.getElementById('cardGrid');
    const errorState = document.getElementById('errorState');
    const filterRow  = document.getElementById('filterRow');
    let activeCuisine = 'all';

    function isBlank(v) {
      return v === null || v === undefined || v === '' ||
             (typeof v === 'number' && isNaN(v)) ||
             (typeof v === 'string' && v.trim().toLowerCase() === 'pending');
    }
    function hours(p) {
      const o = parseInt(p.opening_hour, 10), c = parseInt(p.closing_hour, 10);
      if (isNaN(o) || isNaN(c)) return null;
      return { o, c };
    }
    function isOpen(p) {
      const h = hours(p); if (!h) return false;
      const now = new Date().getHours();
      return now >= h.o && now < h.c;
    }
    function fmt(h) { const ampm = h >= 12 ? 'PM' : 'AM'; return `${h % 12 || 12}:00 ${ampm}`; }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    function renderFilterChips(visible) {
      const counts = new Map();
      visible.forEach(p => (p.services || []).forEach(s => {
        if (isBlank(s)) return;
        counts.set(s, (counts.get(s) || 0) + 1);
      }));
      const cuisines = [...counts.entries()].sort((a, b) => b[1] - a[1]);
      const chips = [
        `<button type="button" class="filter-chip active" aria-pressed="true" data-cuisine="all">All <span class="count">(${visible.length})</span></button>`,
        ...cuisines.map(([name, n]) =>
          `<button type="button" class="filter-chip" aria-pressed="false" data-cuisine="${escapeHtml(name)}">${escapeHtml(name)} <span class="count">(${n})</span></button>`
        )
      ];
      filterRow.innerHTML = chips.join('');
      filterRow.querySelectorAll('.filter-chip').forEach(chip => {
        chip.addEventListener('click', () => {
          activeCuisine = chip.dataset.cuisine;
          filterRow.querySelectorAll('.filter-chip').forEach(c => {
            const on = c === chip;
            c.classList.toggle('active', on);
            c.setAttribute('aria-pressed', on ? 'true' : 'false');
          });
          applyFilter();
        });
      });
    }

    function applyFilter() {
      const cards = grid.querySelectorAll('[data-cuisines]');
      let shown = 0;
      cards.forEach(card => {
        const list = (card.dataset.cuisines || '').split('|');
        const match = activeCuisine === 'all' || list.includes(activeCuisine);
        card.style.display = match ? '' : 'none';
        if (match) shown++;
      });
      const empty = grid.querySelector('.filter-empty');
      if (!shown) {
        if (!empty) {
          const p = document.createElement('p');
          p.className = 'filter-empty';
          p.style.cssText = 'grid-column:1/-1;text-align:center;padding:40px 20px;color:var(--muted);font-size:0.85rem';
          p.textContent = 'No restaurants match this cuisine yet.';
          grid.appendChild(p);
        }
      } else if (empty) {
        empty.remove();
      }
    }

    window.bankiBitesLoad()
      .then(data => {
        const visible = (data.partners || []).filter(p =>
          p && p.is_active !== false && !isBlank(p.name) && !isBlank(p.url)
        );

        if (!visible.length) {
          grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--muted);font-size:0.85rem">No restaurants are registered yet. Check back soon!</p>';
          return;
        }

        renderFilterChips(visible);

        grid.innerHTML = visible.map(p => {
          const h = hours(p);
          const open = isOpen(p);
          const opensAt = h ? fmt(h.o) : '';
          const services = Array.isArray(p.services) ? p.services.filter(s => !isBlank(s)) : [];
          const showRating = !isBlank(p.rating);
          const showHours  = !!h;
          const showAddr   = !isBlank(p.address);
          const logo = isBlank(p.logo)
            ? `<div class="card-logo card-logo-skeleton" aria-hidden="true"></div>`
            : `<img class="card-logo" src="${escapeHtml(p.logo)}" alt="${escapeHtml(p.name)} logo" loading="lazy">`;

          return `
          <a class="rest-card${open || !showHours ? '' : ' rest-card-closed'}"
             href="${open || !showHours ? escapeHtml(p.url) : '#'}"
             ${open || !showHours ? '' : 'aria-disabled="true" tabindex="-1"'}
             role="listitem"
             aria-label="${escapeHtml(p.name)}${open || !showHours ? ' — open menu' : `, currently closed, opens at ${opensAt}`}"
             data-cuisines="${escapeHtml(services.join('|'))}"
             data-umami-event="bankibites-open-menu" data-umami-event-restaurant="${escapeHtml(p.name)}">
            <div class="card-inner">
              ${logo}
              <div class="card-body">
                <div class="card-name">${escapeHtml(p.name)}</div>
                ${services.length ? `<div class="card-tags">${services.map(s => `<span class="tag">${escapeHtml(s)}</span>`).join('')}</div>` : ''}
                <div class="card-meta">
                  ${showRating ? `<span class="rating"><i class="fas fa-star" aria-hidden="true"></i>${escapeHtml(p.rating)} <span>/ 5</span></span>` : ''}
                  ${showHours ? `<span class="open-badge ${open ? 'open' : 'closed'}">${open ? 'Open now' : `Closed · Opens ${opensAt}`}</span>` : ''}
                </div>
                ${showAddr ? `<div class="card-address"><i class="fas fa-map-marker-alt" aria-hidden="true"></i><span>${escapeHtml(p.address)}</span></div>` : ''}
              </div>
            </div>
            <div class="card-cta">
              <span>${open || !showHours ? 'View menu &amp; order' : 'Currently closed'}</span>
              <i class="fas fa-arrow-right" aria-hidden="true"></i>
            </div>
          </a>`;
        }).join('');
      })
      .catch(() => {
        grid.innerHTML = '';
        errorState.style.display = 'block';
      });
  </script>
</body>
</html>
