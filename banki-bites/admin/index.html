<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
  <meta name="theme-color" content="#FF6B35">
  <meta name="robots" content="noindex, nofollow">

  <title>BankiBites Admin</title>

  <link rel="apple-touch-icon" sizes="180x180" href="/assets/img/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/img/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/img/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="icon" href="/favicon.ico">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://akcreation-apps.com/assets/bootstrap/css/bootstrap.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css">

  <script defer src="https://cloud.umami.is/script.js" data-website-id="36497ef4-1185-47b9-bcfb-24598a1a29d3"></script>
</head>
<body>

  <!-- Sign-in gate -->
  <div id="authGate" class="auth-gate">
    <div class="auth-card">
      <img src="/banki-bites/banki-bites-logo.png" alt="BankiBites" class="auth-logo">
      <h2>BankiBites Admin</h2>
      <p class="text-muted">Sign in with your authorised Google account to continue.</p>
      <button id="googleSignInBtn" class="btn btn-primary btn-block btn-google">
        <i class="fab fa-google mr-2"></i> Sign in with Google
      </button>
      <p id="authError" class="auth-error" hidden></p>
    </div>
  </div>

  <!-- Main app -->
  <div id="appShell" hidden>
    <header class="topbar">
      <div class="topbar-brand">
        <img src="/banki-bites/banki-bites-logo.png" alt="" class="topbar-logo">
        <span>Admin</span>
      </div>
      <div class="topbar-user">
        <span id="userEmail" class="user-email"></span>
        <button id="signOutBtn" class="btn btn-sm btn-outline-light" title="Sign out">
          <i class="fas fa-sign-out-alt"></i>
        </button>
      </div>
    </header>

    <nav class="tabbar" role="tablist">
      <button class="tab-btn active" data-tab="orders" role="tab"><i class="fas fa-receipt"></i><span>Orders</span></button>
      <button class="tab-btn" data-tab="partners" role="tab"><i class="fas fa-store"></i><span>Partners</span></button>
      <button class="tab-btn" data-tab="staff" role="tab"><i class="fas fa-motorcycle"></i><span>Delivery</span></button>
    </nav>

    <main class="content">
      <section id="tab-orders" class="tab-panel active"></section>
      <section id="tab-partners" class="tab-panel"></section>
      <section id="tab-staff" class="tab-panel"></section>
    </main>

    <footer class="admin-footer">
      <p>&copy; <span id="footer-year"></span> <a href="https://akcreation-apps.com/services.html">AK Creation</a>. All rights reserved. &nbsp;|&nbsp; Made in Odisha ❤️</p>
    </footer>
  </div>

  <script>document.getElementById('footer-year').textContent = new Date().getFullYear();</script>
  <script type="module" src="app.js"></script>
</body>
</html>
