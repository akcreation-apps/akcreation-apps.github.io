<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <link rel="apple-touch-icon" sizes="180x180" href="tcd-logo.png">
    <link rel="icon" type="image/png" sizes="32x32" href="tcd-logo.png">
    <link rel="icon" type="image/png" sizes="16x16" href="tcd-logo.png">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="icon" href="tcd-logo.png">
    <meta name="theme-color" content="#1A1A2E">
    <title>Cart — The Cafe Darbar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <script src="cart.js" type="module"></script>
    <script src="common.js"></script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary:   #FF6B35;
            --navy:      #1A1A2E;
            --bg:        #F5F0EB;
            --card:      #FFFFFF;
            --text:      #2D2D2D;
            --muted:     #888;
            --border:    #E2D9D0;
            --shadow-sm: 0 1px 4px rgba(0,0,0,0.07);
            --shadow-md: 0 4px 14px rgba(0,0,0,0.13);
            --r:         12px;
            --nav-h:     56px;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            color: var(--text);
            padding-top: var(--nav-h);
        }

        /* ── Loader ── */
        .loader-overlay {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }
        .loader {
            width: 44px; height: 44px;
            border: 4px solid rgba(255,255,255,0.25);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.75s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Navbar ── */
        .navbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: var(--nav-h);
            z-index: 1000;
            background: var(--navy);
            display: flex;
            align-items: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.3);
        }
        .navbar-inner {
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
        }
        .logo {
            cursor: pointer; flex: 1; min-width: 0;
            display: flex; align-items: center; gap: 10px;
        }
        .logo img { height: 40px; width: auto; display: block; flex-shrink: 0; }
        .logo-text {
            font-size: 0.95rem; font-weight: 700; color: #fff;
            font-family: 'Poppins', sans-serif;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .logo-text .brand-accent { color: var(--primary); }
        .nav-icon {
            color: rgba(255,255,255,0.88);
            font-size: 1.1rem; cursor: pointer;
            display: flex; align-items: center;
            transition: color 0.2s, transform 0.2s;
            margin-left: 18px;
        }
        .nav-icon:hover { color: #fff; transform: scale(1.1); }

        /* ── Two-column wrapper (desktop only) ── */
        .cart-wrapper {
            display: block; /* mobile: stacked */
        }

        /* ── Page wrapper ── */
        #cart {
            max-width: 640px;
            margin: 0 auto;
            padding: 0 14px 110px; /* bottom pad clears fixed total bar */
        }

        /* ── Desktop: side-by-side layout ── */
        @media (min-width: 900px) {
            .cart-wrapper {
                display: flex;
                align-items: flex-start;
                gap: 28px;
                max-width: 1100px;
                margin: 0 auto;
                padding: 0 24px 40px;
            }
            #cart {
                flex: 1;
                max-width: none;
                margin: 0;
                padding: 0 0 30px;
            }
            #cart-total-container {
                position: sticky !important;
                top: calc(var(--nav-h) + 16px);
                bottom: auto !important;
                left: auto !important;
                right: auto !important;
                width: 300px;
                flex-shrink: 0;
                border-radius: var(--r);
                border: 1px solid var(--border);
                border-top: 1px solid var(--border) !important;
                box-shadow: var(--shadow-md);
                margin-top: 58px; /* visual align below cart title */
            }
        }

        /* ── Page title ── */
        .cart-page-title {
            font-size: 1.1rem; font-weight: 700;
            color: var(--navy);
            padding: 16px 4px 10px;
            display: flex; align-items: center; gap: 8px;
        }

        /* ── Empty cart ── */
        #empty-cart-banner {
            text-align: center;
            padding: 60px 20px 30px;
        }
        #empty-cart-banner img {
            max-width: 200px; height: auto;
            opacity: 0.82; margin-bottom: 14px;
            display: block; margin: 0 auto 14px;
        }
        #empty-cart-banner p {
            font-size: 0.88rem; color: var(--muted);
            margin-bottom: 18px;
        }
        .browse-btn {
            display: inline-flex; align-items: center; gap: 6px;
            background: var(--primary); color: #fff;
            border: none; border-radius: 24px;
            padding: 10px 22px; font-size: 0.85rem;
            font-weight: 600; font-family: 'Poppins', sans-serif;
            cursor: pointer; transition: background 0.2s;
        }
        .browse-btn:hover { background: #e64a19; }

        /* ── Cart item ── */
        .cart-item {
            display: flex; align-items: center; gap: 10px;
            background: var(--card);
            border-radius: var(--r);
            padding: 10px 12px;
            margin-bottom: 8px;
            box-shadow: var(--shadow-sm);
        }
        .cart-item img {
            width: 56px; height: 56px;
            border-radius: 8px; object-fit: cover;
            flex-shrink: 0;
        }
        .cart-item-info {
            flex: 1; min-width: 0;
        }
        .cart-item-info h5 {
            font-size: 0.8rem; font-weight: 600;
            margin: 0 0 3px; color: var(--text);
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
            display: flex; align-items: center; gap: 4px;
        }
        .cart-item-price {
            font-size: 0.73rem; color: var(--primary);
            font-weight: 600; margin: 0;
        }

        /* nonveg dot */
        .nonveg-icon {
            display: inline-block; flex-shrink: 0;
            width: 10px; height: 10px;
            border: 1.5px solid #900; background: #900;
            border-radius: 2px; position: relative;
        }
        .nonveg-icon::after {
            content: ""; position: absolute;
            top: 1px; left: 1px;
            width: 5px; height: 5px;
            background: #fff; border-radius: 50%;
        }

        /* ── Qty + delete controls ── */
        .cart-item-controls {
            display: flex; align-items: center; gap: 6px; flex-shrink: 0;
        }
        .cart-item-quantity {
            display: flex; align-items: center;
            background: var(--bg); border-radius: 20px;
            border: 1px solid var(--border);
            padding: 0 2px;
        }
        .cart-item-quantity button {
            width: 26px; height: 26px;
            background: none; border: none;
            font-size: 1rem; font-weight: 700;
            cursor: pointer; color: var(--text);
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%;
            transition: background 0.15s, color 0.15s;
        }
        .cart-item-quantity button:hover,
        .cart-item-quantity button:active {
            background: var(--primary); color: #fff;
        }
        .quantity {
            min-width: 22px; text-align: center;
            font-size: 0.8rem; font-weight: 700; color: var(--text);
        }
        .delete-item {
            width: 30px; height: 30px;
            background: none; border: none;
            color: #dc3545; font-size: 0.8rem;
            cursor: pointer; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.15s;
        }
        .delete-item:hover { background: #fdecea; }

        /* ── Total section ── */
        #cart-total-container {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: var(--card);
            border-top: 1px solid var(--border);
            padding: 10px 16px 16px;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.1);
            z-index: 800;
        }
        #delivery-note {
            font-size: 0.72rem;
            line-height: 1.5;
            color: var(--muted);
            margin-bottom: 8px;
        }
        #delivery-note:empty { display: none; }
        .total-row {
            display: flex;
            justify-content: space-between; align-items: center;
            margin-bottom: 10px;
        }
        .total-row .total-label {
            font-size: 0.82rem; color: var(--muted); font-weight: 500;
        }
        #cart-total {
            font-size: 1.2rem; font-weight: 700; color: var(--text);
        }
        #place-order-btn {
            width: 100%;
            background: #25D366; color: #fff;
            border: none; border-radius: var(--r);
            padding: 12px 20px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            cursor: pointer; font-family: 'Poppins', sans-serif;
            transition: background 0.2s, transform 0.15s;
            box-shadow: 0 4px 12px rgba(37,211,102,0.25);
        }
        #place-order-btn:hover { background: #1ebe5d; transform: translateY(-1px); }
        #place-order-btn img { width: 22px; height: 22px; }
        #place-order-btn .btn-text {
            display: flex; flex-direction: column; align-items: flex-start; line-height: 1.2;
        }
        #place-order-btn .main-text { font-size: 0.9rem; font-weight: 600; }
        #place-order-btn .sub-text { font-size: 0.63rem; opacity: 0.85; }
    </style>
</head>
<body>

    <!-- Loader -->
    <div class="loader-overlay" id="loaderOverlay">
        <div class="loader"></div>
    </div>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-inner">
            <div class="logo" onclick="redirect_to_home()">
                <img src="tcd-logo.png" alt="" />
                <span class="logo-text"><span class="brand-accent">The Cafe</span> Darbar</span>
            </div>
            <div style="display:flex; align-items:center;">
                <div class="nav-icon" id="invoiceIcon" style="display: none;" onclick="redirect_to_invoice()">
                    <i class="fas fa-receipt"></i>
                </div>
            </div>
        </div>
    </nav>

    <!-- Wrapper: block on mobile, flex row on desktop -->
    <div class="cart-wrapper">

        <!-- Left / full-width: cart items -->
        <div id="cart">
            <h2 class="cart-page-title">
                <i class="fas fa-shopping-cart" style="color:var(--primary);font-size:0.95rem;"></i>
                Your Cart
            </h2>

            <!-- Empty state -->
            <div id="empty-cart-banner" style="display: none;">
                <img src="../food_src/empty_cart.webp" alt="Empty Cart">
                <p>Your cart is empty!</p>
                <button class="browse-btn" onclick="redirect_to_home()">
                    <i class="fas fa-utensils"></i> Browse Menu
                </button>
            </div>

            <!-- Cart items (populated by cart.js) -->
            <div id="cart-items"></div>
        </div>

        <!-- Right / sticky-bottom: order summary (shown/hidden by cart.js) -->
        <div id="cart-total-container" style="display: none;">
            <div id="delivery-note"></div>
            <div class="total-row">
                <span class="total-label">Grand Total</span>
                <span id="cart-total">₹0.00</span>
            </div>
            <button id="place-order-btn">
                <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp" />
                <span class="btn-text">
                    <span class="main-text">Place Order</span>
                    <span class="sub-text">via WhatsApp</span>
                </span>
            </button>
        </div>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>
</html>
