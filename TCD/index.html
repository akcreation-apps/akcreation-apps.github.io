<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/img/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/img/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/img/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="icon" href="/favicon.ico">
    <meta name="theme-color" content="#1A1A2E">
    <title>The Cafe Darbar (TCD)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <script src="app.js" type="module"></script>
    <script src="common.js"></script>
    <style>
        /* ── Reset ── */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary:      #FF6B35;
            --primary-dark: #E64A19;
            --navy:         #1A1A2E;
            --bg:           #F5F0EB;
            --card:         #FFFFFF;
            --text:         #2D2D2D;
            --muted:        #6B6B6B;
            --border:       #E2D9D0;
            --shadow-sm:    0 1px 4px rgba(0,0,0,0.07);
            --shadow-md:    0 4px 14px rgba(0,0,0,0.13);
            --r:            12px;
            --nav-h:        56px;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            color: var(--text);
            padding-top: var(--nav-h);
        }

        /* ── Loader ── */
        .loader-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }
        .loader {
            width: 44px;
            height: 44px;
            border: 4px solid rgba(255,255,255,0.25);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.75s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Navbar ── */
        .navbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: var(--nav-h);
            z-index: 1000;
            background: var(--navy);
            display: flex;
            align-items: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.3);
        }
        .navbar-inner {
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
        }

        .logo {
            font-size: 1.05rem;
            font-weight: 700;
            color: #fff;
            cursor: pointer;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            letter-spacing: 0.2px;
            background: none;
            border: none;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            text-align: left;
        }
        .logo .brand-accent { color: var(--primary); }

        .icon-container {
            display: flex;
            align-items: center;
            gap: 18px;
            flex-shrink: 0;
        }

        .nav-icon {
            color: rgba(255,255,255,0.88);
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            transition: color 0.2s, transform 0.2s;
            background: none;
            border: none;
            padding: 0;
        }
        .nav-icon:hover { color: #fff; transform: scale(1.1); }

        /* Keep IDs used by app.js */
        #searchIcon  {}
        #invoiceIcon {}

        /* ── Refer icon with blinking dot ── */
        .refer-btn {
            position: relative;
            color: rgba(255,255,255,0.88);
        }
        .refer-btn::after {
            content: '';
            position: absolute;
            top: -4px; right: -4px;
            width: 8px; height: 8px;
            background: #FFD700;
            border-radius: 50%;
            animation: referPulse 1.4s ease-in-out infinite;
        }
        @keyframes referPulse {
            0%,100% { transform: scale(1);   opacity: 1; box-shadow: 0 0 0 0 rgba(255,215,0,0.7); }
            50%      { transform: scale(1.25); opacity: 0.8; box-shadow: 0 0 0 5px rgba(255,215,0,0); }
        }

        .cart-icon { position: relative; }
        .cart-count {
            position: absolute;
            top: -7px; right: -9px;
            background: var(--primary);
            color: #fff;
            font-size: 0.6rem;
            font-weight: 700;
            min-width: 16px;
            height: 16px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 3px;
        }

        /* ── Sticky bar (shortcuts + filters + search) ── */
        .sticky-bar {
            position: sticky;
            top: var(--nav-h);
            z-index: 900;
            background: var(--bg);
            padding-bottom: 2px;
        }
        .sticky-inner {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* ── Category chips ── */
        .shortcuts-container { padding: 8px 12px 0; }
        .shortcuts-grid {
            display: flex;
            gap: 7px;
            overflow-x: auto;
            padding: 2px 2px 8px;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .shortcuts-grid::-webkit-scrollbar { display: none; }

        .shortcut-card {
            flex: 0 0 auto;
            background: var(--card);
            border: 1.5px solid var(--border);
            border-radius: 20px;
            padding: 5px 13px;
            cursor: pointer;
            user-select: none;
            transition: background 0.18s, border-color 0.18s;
        }
        .shortcut-card:hover,
        .shortcut-card:active {
            background: var(--primary);
            border-color: var(--primary);
        }
        .shortcut-card:hover a,
        .shortcut-card:active a { color: #fff; }
        .shortcut-card a {
            text-decoration: none;
            color: var(--text);
            font-size: 0.76rem;
            font-weight: 500;
            white-space: nowrap;
            display: block;
        }

        /* ── Filter pills ── */
        .filter-container {
            display: flex;
            justify-content: center;
            padding: 4px 12px 6px;
        }
        .filter-card {
            display: flex;
            gap: 8px;
            background: var(--card);
            border-radius: 24px;
            padding: 4px 14px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
        }
        .filter-label {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.78rem;
            font-weight: 500;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 14px;
            transition: background 0.15s;
            user-select: none;
        }
        .filter-label:hover { background: #F0EBE5; }
        .filter-label input[type="checkbox"] {
            accent-color: var(--primary);
            width: 14px;
            height: 14px;
            cursor: pointer;
            margin: 0;
        }

        /* ── Search ── */
        .search-container {
            position: relative;
            padding: 4px 12px 8px;
        }
        .search-container input[type="text"] {
            width: 100%;
            padding: 9px 38px 9px 38px;
            border: 1.5px solid var(--border);
            border-radius: 24px;
            font-size: 0.85rem;
            font-family: 'Poppins', sans-serif;
            background: var(--card);
            color: var(--text);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .search-container input[type="text"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(255,107,53,0.12);
        }
        .search-container input[type="text"]::placeholder { color: #bbb; }
        .search-prefix-icon {
            position: absolute;
            left: 24px;
            top: 50%;
            transform: translateY(-50%);
            color: #bbb;
            font-size: 0.8rem;
            pointer-events: none;
        }
        .clear-button {
            position: absolute;
            right: 24px;
            top: 50%;
            transform: translateY(-50%);
            border: none;
            background: none;
            color: #bbb;
            font-size: 1.15rem;
            cursor: pointer;
            display: none;
            line-height: 1;
            padding: 0;
            transition: color 0.15s;
        }
        .clear-button:hover { color: var(--primary); }

        .sticky-divider {
            height: 1px;
            background: var(--border);
            margin: 0 12px;
        }

        /* ── Menu section ── */
        .menu { padding: 10px 0 4px; }
        .menu-container {
            padding: 0 16px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* ── Category block ── */
        .category-block {
            margin-bottom: 20px;
            scroll-margin-top: calc(var(--nav-h) + 144px); /* navbar + sticky-bar height */
        }
        .category-block > h3 {
            font-size: 1rem;
            font-weight: 700;
            color: var(--navy);
            padding: 8px 4px 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .category-block > h3::after {
            content: '';
            flex: 1;
            height: 2px;
            background: linear-gradient(90deg, var(--primary) 0%, transparent 100%);
            border-radius: 2px;
        }

        /* ── Subcategory block ── */
        .subcategory-block { margin-bottom: 10px; }
        .subcategory-block h4 {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.9px;
            padding: 4px 4px 5px;
        }

        /* ── Dish grid ── */
        .dish-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        /* ── Menu item wrapper ──
           JS sets background: #f1c2c2 (nonveg) or #c2e6c2 (veg) as inline style.
           padding-bottom lets that color peek out as a visible indicator strip. */
        .menu-item {
            border-radius: var(--r);
            overflow: hidden;
            padding-bottom: 5px;
        }
        .menu-item-container { display: block; width: 100%; }

        /* ── Dish card ── */
        .dish-card {
            position: relative;
            width: 100%;
            aspect-ratio: 5 / 6;
            border-radius: var(--r) var(--r) 0 0; /* flat bottom sits on color strip */
            overflow: hidden;
            box-shadow: var(--shadow-md);
            cursor: pointer;
        }

        .dish-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.35s ease;
        }
        .dish-card:hover .dish-img { transform: scale(1.04); }

        .dish-overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            padding: 20px 6px 6px;
            background: linear-gradient(to top, rgba(0,0,0,0.72) 0%, transparent 100%);
            color: #fff;
        }
        .dish-name {
            font-size: 0.7rem;
            font-weight: 600;
            margin: 0 0 1px;
            line-height: 1.2;
        }
        .price {
            font-size: 0.65rem;
            font-weight: 700;
            color: #FFD166;
            margin: 0;
        }

        /* ── Add-to-cart button ── */
        .add-to-cart-btn {
            position: absolute;
            top: 6px; right: 6px;
            background: rgba(255,255,255,0.88);
            border: none;
            border-radius: 50%;
            width: 36px; height: 36px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.18);
            transition: background 0.18s, transform 0.15s;
            z-index: 1;
        }
        .add-to-cart-btn:hover,
        .add-to-cart-btn:active {
            background: var(--primary);
            transform: scale(1.12);
        }
        .add-to-cart-btn.added-to-cart { background: var(--primary); }
        .add-to-cart-btn::before {
            content: '';
            position: absolute;
            inset: -8px;
            border-radius: 50%;
        }

        /* ── Cart badge pop ── */
        @keyframes badgePop {
            0%   { transform: scale(1); }
            40%  { transform: scale(1.6); }
            70%  { transform: scale(0.88); }
            100% { transform: scale(1); }
        }
        .cart-count.pop { animation: badgePop 0.38s ease; }

        /* ── Toast ── */
        .cart-toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(90px);
            background: var(--navy);
            color: #fff;
            padding: 11px 16px 11px 14px;
            border-radius: 24px;
            font-size: 0.8rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.28);
            z-index: 8000;
            opacity: 0;
            transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), opacity 0.25s ease;
            white-space: nowrap;
            pointer-events: none;
            max-width: calc(100vw - 32px);
        }
        .cart-toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
            pointer-events: auto;
        }
        .cart-toast .toast-icon { color: #4CAF50; font-size: 0.95rem; flex-shrink: 0; }
        .cart-toast .toast-msg { overflow: hidden; text-overflow: ellipsis; }
        .cart-toast .toast-action {
            color: var(--primary);
            font-weight: 700;
            text-decoration: none;
            flex-shrink: 0;
            padding-left: 4px;
        }
        .cart-toast .toast-action:hover { text-decoration: underline; }

        /* ── No results ── */
        .no-results {
            text-align: center;
            padding: 40px 20px;
        }
        .no-results img {
            max-width: 160px;
            opacity: 0.65;
        }

        /* ── Footer ── */
        footer {
            text-align: center;
            padding: 18px 16px;
            font-size: 0.72rem;
            color: var(--muted);
            border-top: 1px solid var(--border);
            margin-top: 12px;
        }
        footer a { color: var(--primary); text-decoration: none; }

        /* ── Responsive ── */
        @media (max-width: 320px) {
            .dish-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (min-width: 480px) {
            .dish-grid { grid-template-columns: repeat(4, 1fr); }
        }
        @media (min-width: 768px) {
            .dish-grid { grid-template-columns: repeat(5, 1fr); gap: 10px; }
        }
        @media (min-width: 1024px) {
            .dish-grid { grid-template-columns: repeat(6, 1fr); gap: 12px; }
        }
        @media (min-width: 1400px) {
            .dish-grid { grid-template-columns: repeat(8, 1fr); gap: 14px; }
        }

        /* ── Focus visibility ── */
        :focus-visible {
            outline: 2px solid var(--primary);
            outline-offset: 3px;
            border-radius: 4px;
        }
        .search-container input[type="text"]:focus-visible {
            outline: 2px solid var(--primary);
            outline-offset: 2px;
            box-shadow: 0 0 0 3px rgba(255,107,53,0.12);
        }

        /* ── Screen reader only ── */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0,0,0,0);
            white-space: nowrap;
            border: 0;
        }

        /* ── Skip link ── */
        .skip-link {
            position: absolute;
            top: -40px;
            left: 0;
            background: var(--primary);
            color: #fff;
            padding: 8px 16px;
            z-index: 9999;
            border-radius: 0 0 var(--r) 0;
            font-size: 0.85rem;
            font-weight: 600;
            text-decoration: none;
            transition: top 0.15s;
        }
        .skip-link:focus { top: 0; }

        /* ── Reduced motion ── */
        @media (prefers-reduced-motion: reduce) {
            .refer-btn::after { animation: none; }
            html { scroll-behavior: auto; }
        }
    </style>
</head>
<body>

    <!-- Skip link -->
    <a href="#menu" class="skip-link">Skip to menu</a>

    <!-- Loader -->
    <div class="loader-overlay" id="loaderOverlay">
        <div class="loader"></div>
    </div>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-inner">
            <button class="logo" onclick="redirect_to_home()" aria-label="The Cafe Darbar - Go home">
                🍽️ <span class="brand-accent">The Cafe</span> Darbar
            </button>
            <div class="icon-container">
                <a class="nav-icon refer-btn" href="referral.html" aria-label="Refer & Earn">
                    <i class="fas fa-share-alt" aria-hidden="true"></i>
                </a>
                <button class="nav-icon" id="searchIcon" aria-label="Search dishes">
                    <i class="fas fa-search" aria-hidden="true"></i>
                </button>
                <button class="nav-icon" id="invoiceIcon" style="display: none;" onclick="redirect_to_invoice()" aria-label="View invoice">
                    <i class="fas fa-receipt" aria-hidden="true"></i>
                </button>
                <button class="nav-icon cart-icon" onclick="redirect_to_cart()" aria-label="View cart — 0 items">
                    <i class="fas fa-shopping-cart" aria-hidden="true"></i>
                    <span class="cart-count" aria-live="polite" aria-atomic="true">0</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Sticky bar: shortcuts + filters + search -->
    <div class="sticky-bar">
        <div class="sticky-inner">
            <!-- Category shortcut chips -->
            <div class="shortcuts-container">
                <div class="shortcuts-grid">
                    <!-- Dynamically populated by app.js -->
                </div>
            </div>

            <!-- Veg / Non-Veg filter -->
            <div class="filter-container">
                <div class="filter-card">
                    <label class="filter-label">
                        <input type="checkbox" id="vegFilter" /> 🥗 Veg
                    </label>
                    <label class="filter-label">
                        <input type="checkbox" id="nonVegFilter" /> 🍗 Non-Veg
                    </label>
                </div>
            </div>

            <!-- Search -->
            <div class="search-container">
                <i class="fas fa-search search-prefix-icon" aria-hidden="true"></i>
                <label for="searchBar" class="sr-only">Search dishes</label>
                <input type="text" id="searchBar" placeholder="Search dishes…" autocomplete="off" />
                <button id="clearSearch" class="clear-button" aria-label="Clear search">&times;</button>
            </div>

            <div class="sticky-divider"></div>
        </div>
    </div>

    <!-- Menu -->
    <section class="menu" id="menu" aria-label="Food menu">
        <div class="menu-container" id="menu-container">
            <!-- Dynamically populated by app.js -->
        </div>
    </section>

    <!-- No results -->
    <div class="no-results" id="noResults" style="display: none;">
        <img src="../food_src/no-results.webp" alt="No Results Found" />
    </div>

    <!-- Cart toast -->
    <div class="cart-toast" id="cartToast" role="status" aria-live="polite">
        <i class="fas fa-check-circle toast-icon" aria-hidden="true"></i>
        <span class="toast-msg" id="toastMsg">Added to cart</span>
        <a class="toast-action" href="cart.html">View Cart →</a>
    </div>

    <!-- Footer -->
    <footer>
        <p>&copy; <span id="footer-year"></span> <a href="https://akcreation-apps.com/food-order-kiosk.html" target="_blank">AkCreation</a> | Made in India with ❤️</p>
    </footer>

    <script>
        document.getElementById('footer-year').textContent = new Date().getFullYear();
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</body>
</html>
